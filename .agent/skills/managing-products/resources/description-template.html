<!-- Inline CSS Template: Constrained Flexbox Layout (Tile System) -->
<div style="font-family: 'Cairo', sans-serif; direction: rtl; text-align: right; max-width: 100%;">

    <!-- Part Numbers -->
    <div
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2px; border-radius: 12px; margin: 25px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div style="background: white; padding: 15px; border-radius: 10px;">
            <h4
                style="font-size: 18px; font-weight: 800; margin: 0 0 15px 0; color: #4a5568; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; margin-bottom: 15px;">
                ⚙️ <span style="display:inline-block">أرقام القطع</span>
                <span style="font-size: 14px; color: #718096; font-weight: normal;">(Part Numbers)</span>
            </h4>

            <!-- Flex Container: Centered, Wrapped, Small Gap -->
            <div style="display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;">
